<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smoke App Dashboard</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;family=Public+Sans&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config defined by Design System -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {},
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Plus Jakarta Sans"
                    ],
                    "display": [
                            "Plus Jakarta Sans"
                    ],
                    "body": [
                            "Inter"
                    ],
                    "label": [
                            "Public Sans"
                    ]
            },
            "fontSize": {}
    },
        },
      }
    </script>
<style>
        body {
            background-color: #0A0A1A;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: 100px; /* Space for BottomNavBar */
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Glassmorphism utility classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .glass-card-premium {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            position: relative;
            z-index: 1;
        }
        
        .glass-card-premium::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, #7C3AED, #06B6D4);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            z-index: -1;
        }

        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(to right, #7C3AED, #06B6D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Ambient Background Orbs */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
        }
        
        .orb-1 {
            width: 300px;
            height: 300px;
            background: #7C3AED;
            top: -100px;
            left: -100px;
        }
        
        .orb-2 {
            width: 400px;
            height: 400px;
            background: #06B6D4;
            bottom: 20%;
            right: -150px;
            opacity: 0.2;
        }

        /* Progress Ring Stroke Animation */
        .progress-ring__circle {
            transition: stroke-dashoffset 1s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        
        /* Material Symbols Fill Configuration */
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen relative">
<!-- Ambient Decor -->
<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>
<!-- MAIN APP CONTAINER -->
<main class="max-w-md mx-auto w-full relative px-6 pt-12 pb-24">
<!-- HEADER ROW -->
<header class="flex justify-between items-center mb-8 w-full top-0">
<div>
<h1 class="text-white font-headline font-bold text-2xl tracking-tight">Merhaba, Ali 👋</h1>
</div>
<button class="relative p-2 rounded-full glass-card hover:bg-white/10 transition-colors">
<span aria-hidden="true" class="material-symbols-outlined text-white">notifications</span>
<span class="absolute top-2 right-2 w-2.5 h-2.5 bg-emerald-500 rounded-full border border-[#0A0A1A]"></span>
</button>
</header>
<!-- TIMER SECTION -->
<section class="mb-8 text-center">
<p class="text-[#A3A3C2] text-sm uppercase tracking-wider font-label mb-2">Hedefe Doğru</p>
<h2 class="text-gradient font-headline font-extrabold text-4xl tracking-tight drop-shadow-md">
                14 Gün 6 Saat 42 Dk
            </h2>
</section>
<!-- MAIN HERO CARD (Progress Ring) -->
<section class="glass-card-premium rounded-3xl p-8 mb-8 flex flex-col items-center justify-center shadow-[0_0_40px_rgba(124,58,237,0.15)]">
<div class="relative w-48 h-48 mb-6">
<svg class="w-full h-full" viewbox="0 0 120 120">
<!-- Background Circle -->
<circle cx="60" cy="60" fill="none" r="54" stroke="rgba(255,255,255,0.05)" stroke-width="8"></circle>
<!-- Progress Circle (Cyan) - roughly 80% filled -->
<!-- Circumference = 2 * pi * r = ~339.29 -->
<!-- Dashoffset for 80% = 339.29 - (339.29 * 0.8) = 67.85 -->
<circle class="progress-ring__circle" cx="60" cy="60" fill="none" r="54" stroke="#06B6D4" stroke-dasharray="339.29" stroke-dashoffset="67.85" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-headline font-extrabold text-6xl text-white">14</span>
</div>
</div>
<h3 class="text-xl text-white font-headline font-bold text-center">Gün Sigara İçmedin 🎉</h3>
</section>
<!-- STATS GRID -->
<section class="grid grid-cols-2 gap-4 mb-8">
<!-- Card 1 -->
<div class="glass-card rounded-2xl p-5 flex flex-col items-start relative overflow-hidden group">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-cyan-300"></div>
<div class="flex items-center gap-2 mb-2 w-full">
<span class="material-symbols-outlined text-[#06B6D4] text-xl" data-weight="fill">smoke_free</span>
<span class="text-[#A3A3C2] text-xs uppercase tracking-wider font-label">Kaçırılan</span>
</div>
<span class="text-white font-headline font-bold text-2xl">168 Sigara</span>
</div>
<!-- Card 2 -->
<div class="glass-card rounded-2xl p-5 flex flex-col items-start relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-emerald-400"></div>
<div class="flex items-center gap-2 mb-2 w-full">
<span class="material-symbols-outlined text-[#10B981] text-xl" data-weight="fill">payments</span>
<span class="text-[#A3A3C2] text-xs uppercase tracking-wider font-label">Tasarruf</span>
</div>
<span class="text-white font-headline font-bold text-2xl">₺1,260</span>
</div>
<!-- Card 3 -->
<div class="glass-card rounded-2xl p-5 flex flex-col items-start relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-500 to-amber-400"></div>
<div class="flex items-center gap-2 mb-2 w-full">
<span class="material-symbols-outlined text-[#F59E0B] text-xl" data-weight="fill">warning</span>
<span class="text-[#A3A3C2] text-xs uppercase tracking-wider font-label">Yenildin</span>
</div>
<span class="text-white font-headline font-bold text-2xl">12 İstek</span>
</div>
<!-- Card 4 -->
<div class="glass-card rounded-2xl p-5 flex flex-col items-start relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-violet-500 to-purple-400"></div>
<div class="flex items-center gap-2 mb-2 w-full">
<span class="material-symbols-outlined text-[#7C3AED] text-xl" data-weight="fill">military_tech</span>
<span class="text-[#A3A3C2] text-xs uppercase tracking-wider font-label">Kazanıldı</span>
</div>
<span class="text-white font-headline font-bold text-2xl">3 Rozet</span>
</div>
</section>
<!-- NEXT MILESTONE -->
<section class="glass-card rounded-2xl p-6 mb-8">
<div class="flex justify-between items-center mb-4">
<span class="text-white font-headline font-bold text-lg">Bir sonraki: 21 Gün</span>
<span class="text-[#A3A3C2] text-sm font-medium">66%</span>
</div>
<div class="w-full h-3 bg-black/40 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-[#7C3AED] to-[#06B6D4] rounded-full" style="width: 66%;"></div>
</div>
</section>
<!-- ACTION BUTTONS -->
<section class="grid grid-cols-2 gap-4 mb-8">
<button class="bg-gradient-to-r from-[#7C3AED] to-[#8B5CF6] text-white font-medium py-4 px-2 rounded-full shadow-[0_4px_20px_rgba(124,58,237,0.3)] hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="text-xl">🔥</span>
<span>İstek Kaydet</span>
</button>
<button class="bg-white/10 backdrop-blur-md border border-white/20 text-white font-medium py-4 px-2 rounded-full hover:bg-white/20 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="text-xl">🫁</span>
<span>Nefes Egzersizi</span>
</button>
</section>
</main>
<!-- BOTTOM NAV BAR (Predicted Component Structure) -->
<!-- Content logic applied: Home is active -->
<nav class="fixed bottom-6 left-4 right-4 z-50 flex justify-around items-center h-16 px-2 bg-[#0F0F1F]/60 backdrop-blur-xl border border-white/10 shadow-2xl shadow-purple-900/20 rounded-full max-w-md mx-auto">
<!-- Tab 1: Home (ACTIVE) -->
<a class="flex flex-col items-center justify-center text-[#7C3AED] scale-110 transition-all active:scale-90 duration-200 hover:bg-white/5 rounded-full p-2 w-14 h-14" href="#">
<span class="material-symbols-outlined" data-weight="fill">home</span>
<span class="font-label text-[10px] uppercase tracking-wider mt-1">Home</span>
</a>
<!-- Tab 2: Progress -->
<a class="flex flex-col items-center justify-center text-[#A3A3C2] hover:text-white transition-colors active:scale-90 duration-200 hover:bg-white/5 rounded-full p-2 w-14 h-14" href="#">
<span class="material-symbols-outlined">query_stats</span>
<span class="font-label text-[10px] uppercase tracking-wider mt-1">Progress</span>
</a>
<!-- Tab 3: Stats -->
<a class="flex flex-col items-center justify-center text-[#A3A3C2] hover:text-white transition-colors active:scale-90 duration-200 hover:bg-white/5 rounded-full p-2 w-14 h-14" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-label text-[10px] uppercase tracking-wider mt-1">Stats</span>
</a>
<!-- Tab 4: Community -->
<a class="flex flex-col items-center justify-center text-[#A3A3C2] hover:text-white transition-colors active:scale-90 duration-200 hover:bg-white/5 rounded-full p-2 w-14 h-14" href="#">
<span class="material-symbols-outlined">group</span>
<span class="font-label text-[10px] uppercase tracking-wider mt-1">Community</span>
</a>
<!-- Tab 5: Profile -->
<a class="flex flex-col items-center justify-center text-[#A3A3C2] hover:text-white transition-colors active:scale-90 duration-200 hover:bg-white/5 rounded-full p-2 w-14 h-14" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label text-[10px] uppercase tracking-wider mt-1">Profile</span>
</a>
</nav>
<!-- Optional JS for micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Animate progress ring on load
            setTimeout(() => {
                const circle = document.querySelector('.progress-ring__circle');
                if(circle) {
                    // Start from 0 (fully dashed out) to actual value
                    circle.style.strokeDashoffset = '339.29';
                    setTimeout(() => {
                        circle.style.strokeDashoffset = '67.85';
                    }, 100);
                }
            }, 100);
        });
    </script>
</body></html>
